{% extends "base.html" %}
{% block title %}Pagina niet gevonden — Little Wings{% endblock %}
{% block content %}
<div class="error-page">
  <div class="error-card">
    <div class="error-code">404</div>
    <div class="error-icon">🕊️</div>
    <h1 class="error-title">Pagina niet gevonden</h1>
    <p class="error-msg">
      Deze pagina bestaat niet of is verplaatst.<br>
      Misschien vloog ze weg op haar eigen vleugels.
    </p>
    <div class="error-knoppen">
      <a href="{{ url_for('shop.shop') }}" class="knop-teal">🛍️ Naar de shop</a>
      <a href="{{ url_for('auth.index') }}" class="error-knop-sec">← Terug naar home</a>
    </div>
  </div>
</div>
{% endblock %}
