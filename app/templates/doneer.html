{% extends "base.html" %}

{% block title %}{{ _('Doneer') }} — Little Wings{% endblock %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/doneer.css') }}">

<div class="doneer-wrapper">

  <h1>❤️ {{ _('Doneer') }}</h1>

  <form method="POST" action="{{ url_for('shop.doneer') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>{{ _('Naam') }}</label>
    <input type="text" name="naam" required>

    <label>{{ _('E-mailadres') }}</label>
    <input type="email" name="email" required>

    <label>{{ _('Bepaal zelf jouw bijdrage 💜') }}</label>
    <div class="bedrag-invoer">
      <span>€</span>
      <input type="text" name="eigen_bedrag" placeholder="{{ _('bijv. 15') }}">
    </div>

    <label>{{ _('Bericht (optioneel) 💬') }}</label>
    <textarea name="bericht" rows="3" placeholder="{{ _('Schrijf hier een berichtje...') }}"></textarea>

    <button type="submit">{{ _('Verder naar betalen →') }}</button>
  </form>

</div>

{% endblock %}
